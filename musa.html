<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profeet Musa</title>
    <link rel="stylesheet" href="css/design.css">
</head>
<body>
    <button class="backButton" onclick="location.href='index.html'">Terug naar start</button>

<div class="container">

    <h1>Prophet Musa (AS)</h1>

    <h2>Story Phase 1 – De geboorte</h2>

    <p>
        Musa werd geboren in een tijd van onderdrukking onder de farao...
    </p>

    <!-- IMAGE -->
    <div id="imageSection">
    <img src="image/musa.jpg" width="40%" />
    <br><br>
    <button onclick="showAudio()">Ga Verder</button>
    </div>

    <!-- AUDIO -->
     <div id="audioSection" style="display:none;">
    <audio controls>
        <source src="audio/Coran Arabe sourate 28.mp3" type="audio/mpeg">
    </audio>
    <br><br>
        <button onclick="showVideo()">Ga Verder</button>
    </div>

    <!-- VIDEO -->
    <div id="videoSection" style="display:none;">
    <iframe width="100%" height="315"
        src="https://www.youtube.com/embed/5HeiiplSlrA"
        frameborder="0"
        allowfullscreen>
    </iframe>
    <br><br>
        <button onclick="showQuiz()">Start Quiz</button>
    </div>

    <!-- QUIZ -->
<div id="quizSection" style="display:none;">
    <h3>Quiz</h3>
    <div id="quizContainer"></div>
</div>

<div id="progressWrapper" style="width: 100%; background: #eee; margin-top: 10px;">
    <div id="progressBar" style="width: 0%; height: 20px; background: #d6cfc1;"></div>
</div>


</div>
<script src="js/musa.js"></script>
    
</body>
</html>
